<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKUTT - Logga in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1a1b1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .login-box {
            background: #25262b;
            padding: 35px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
            border: 1px solid #3f4147;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #1a1b1e;
            border: 1px solid #3f4147;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            border-color: #33ccff;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 5px;">
            <line x1="15" y1="85" x2="85" y2="85" stroke="#eed57e" stroke-width="6" stroke-linecap="round" />
            <line x1="25" y1="96" x2="75" y2="96" stroke="#eed57e" stroke-width="6" stroke-linecap="round" />
            <path d="M 15 75 Q 50 10 80 65" fill="none" stroke="#33ccff" stroke-width="5" stroke-linecap="round" stroke-dasharray="8, 6" />
            <path d="M 75 70 C 65 70, 70 55, 80 50 C 85 45, 88 55, 85 70 Z" fill="#33ccff" />
            <path d="M 80 55 L 75 35 L 83 48 L 88 32 L 87 50 Z" fill="#33ccff" stroke="#33ccff" stroke-width="2" stroke-linejoin="round" />
        </svg>
        
        <span style="font-size: 2.8em; font-weight: 800; letter-spacing: 4px; color: #ffffff; text-transform: uppercase; text-shadow: 0px 4px 15px rgba(51, 204, 255, 0.3);">
            SKUTT
        </span>
        
        <span style="font-size: 0.85em; color: #888888; letter-spacing: 0.5px; margin-top: 10px; line-height: 1.4; font-weight: 500; text-align: center;">
            Smart Kontrollsystem för Uppdatering<br>av Trassliga Tidtabeller
        </span>
    </div>

    <div class="login-box">
        <h3 style="margin-top:0; margin-bottom: 20px; color:#e4e5e7;">Logga in</h3>
        
        <input type="text" id="authUsername" class="login-input" placeholder="Användarnamn">
        <input type="password" id="authPassword" class="login-input" placeholder="Lösenord">
        
        <button id="loginBtn" class="sidebar-btn full-width" style="border-color:#33ccff; color:#33ccff; margin-bottom:10px; font-size:14px; padding:10px;">Logga in</button>
        <button id="registerBtn" class="sidebar-btn full-width" style="border-color:#eed57e; color:#eed57e; font-size:14px; padding:10px;">Skapa nytt konto</button>
        
        <div id="authMessage" style="color:#ff6b6b; margin-top:15px; font-size:13px; height:15px; font-weight:500;"></div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
