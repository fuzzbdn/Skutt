<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKUTT - Inställningar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="topbar">
        <h2>⚙️ Personliga Inställningar</h2>
        <button onclick="window.location.href='graph.html'" class="topbar-btn">Tillbaka till Graf</button>
    </div>

    <div class="admin-container" style="max-width: 600px; margin: 40px auto; padding: 20px; background: #25262b; border-radius: 8px;">
        
        <div style="margin-bottom: 25px;">
            <label style="color: #ececec; font-weight: bold; display: block; margin-bottom: 5px;">Skrollsteg i grafen (minuter)</label>
            <p style="font-size: 0.8em; color: #888; margin-bottom: 10px;">Antal minuter grafen ska hoppa fram/bakåt för varje "klick" på mushjulet.</p>
            <input type="number" id="scrollMinutesInput" value="10" style="width: 100%; padding: 10px; background: #1a1b1e; border: 1px solid #373a40; color: white; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="color: #ececec; font-weight: bold; display: block; margin-bottom: 5px;">Tidsjustering noder (minuter)</label>
            <p style="font-size: 0.8em; color: #888; margin-bottom: 10px;">Antal minuter tiderna ska flyttas när du hovrar över ett tågs uppehåll och skrollar.</p>
            <input type="number" id="nodeStepInput" value="2" style="width: 100%; padding: 10px; background: #1a1b1e; border: 1px solid #373a40; color: white; border-radius: 4px;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="color: #ececec; font-weight: bold; display: block; margin-bottom: 5px;">Grafens Tidsfönster (Zoom)</label>
            <p style="font-size: 0.8em; color: #888; margin-bottom: 10px;">Hur många minuter som ska visas på skärmen samtidigt (Standard 120 minuter).</p>
            <input type="number" id="viewDurationInput" value="120" style="width: 100%; padding: 10px; background: #1a1b1e; border: 1px solid #373a40; color: white; border-radius: 4px;">
        </div>

        <button id="saveSettingsBtn" class="sidebar-btn full-width" style="border-color: #33ccff; color: #33ccff; padding: 12px; font-size: 1.1em;">💾 Spara inställningar</button>
    </div>

    <script type="module" src="js/settings.js"></script>
</body>
</html>
